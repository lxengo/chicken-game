<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
font-family:"JK", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
touch-action:none;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let chicken,obstacles=[]

// タップ制御
let lastTap=0
let ignoreTapUntil=0
const delay=250

function tap(){
if(state!="game") return
if(Date.now()<ignoreTapUntil) return

let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}

lastTap=now
}

document.addEventListener("touchstart",tap)
document.addEventListener("mousedown",tap)

// リセット
function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
speed=baseSpeed
}

// 難易度
function start(d){
if(d=="easy"){baseSpeed=5;maxSpeed=10}
else if(d=="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
ignoreTapUntil=Date.now()+200
}

// 座標
function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// サボテン生成
setInterval(()=>{
if(state=="game"){
let h=40+Math.random()*60
obstacles.push({
x:1280,
y:600-h,
w:30,
h:h
})
}
},1200)

// 更新
function update(){
if(state!="game")return

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x<o.x+o.w &&
chicken.x+50>o.x &&
chicken.y<o.y+o.h &&
chicken.y+50>o.y
){
state="gameover"
ignoreTapUntil=Date.now()+300

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ボタン
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// タイトル
function drawTitle(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("🐔 ちきんゲーム",640,200)

drawBtn(440,350,400,80,"EASY")
drawBtn(440,460,400,80,"NORMAL")
drawBtn(440,570,400,80,"HARD")
}

// ゲーム
function drawGame(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

ctx.font="50px JK"
ctx.fillText("🐔",chicken.x,chicken.y+40)

ctx.fillStyle="green"
obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h))

ctx.fillStyle="black"
ctx.textAlign="left"
ctx.font="40px JK"

ctx.fillText("Score "+score,40,60)
ctx.fillText("High "+highScore,40,110)

drawBtn(1100,20,140,60,"☰")
}

// メニュー
function drawMenu(){
ctx.fillStyle="rgba(0,0,0,0.7)"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.fillRect(340,180,600,360)

let h=360/3

drawBtn(360,200,560,h-20,"再開")
drawBtn(360,200+h,560,h-20,"リスタート")
drawBtn(360,200+h*2,560,h-20,"タイトル")
}

// ゲームオーバー
function drawGameOver(){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("💀 GAME OVER",640,260)

ctx.font="40px JK"
ctx.fillText("Score "+score,640,330)

drawBtn(440,420,400,80,"RESTART")
drawBtn(440,530,400,80,"TITLE")
}

// クリック処理
function handleClick(x,y){

if(Date.now()<ignoreTapUntil) return

if(state=="title"){
if(inRect(x,y,440,350,400,80))start("easy")
if(inRect(x,y,440,460,400,80))start("normal")
if(inRect(x,y,440,570,400,80))start("hard")
}

else if(state=="game"){
if(inRect(x,y,1100,20,140,60)){
state="menu"
ignoreTapUntil=Date.now()+200
}
}

else if(state=="menu"){
let h=360/3

if(inRect(x,y,360,200,560,h-20)){
state="game"
ignoreTapUntil=Date.now()+200
}

if(inRect(x,y,360,200+h,560,h-20)){
reset()
state="game"
ignoreTapUntil=Date.now()+200
}

if(inRect(x,y,360,200+h*2,560,h-20)){
state="title"
ignoreTapUntil=Date.now()+300
}
}

else if(state=="gameover"){
if(inRect(x,y,440,420,400,80)){
reset()
state="game"
ignoreTapUntil=Date.now()+200
}

if(inRect(x,y,440,530,400,80)){
state="title"
ignoreTapUntil=Date.now()+300
}
}
}

// イベント
canvas.addEventListener("click",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

canvas.addEventListener("touchstart",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

// ループ
function loop(){
update()

if(state=="title")drawTitle()
if(state=="game")drawGame()
if(state=="menu")drawMenu()
if(state=="gameover")drawGameOver()

requestAnimationFrame(loop)
}

loop()
</script>
</body>
</html>
