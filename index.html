<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
font-family:"JK", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"

let score=0
let highScore=localStorage.getItem("high")||0

let skins=["🐔","🐤","🍗","🦅","🐲"]
let selectedSkin=localStorage.getItem("skin")||0

let skinInfo=[
"安定（標準バランス）",
"ジャンプ強い（扱いやすい）",
"ジャンプ強い（🐤と同じ）",
"ジャンプ強い（上位）",
"ジャンプ最強（✨エフェクト）"
]

function isUnlocked(i){
if(i<=2) return true
if(i==3 && highScore>=5000) return true
if(i==4 && highScore>=8000) return true
return false
}

// 能力
let jumpPower=16
let gravity=0.8

function applySkin(){
if(selectedSkin==0){jumpPower=16;gravity=0.8}
if(selectedSkin==1){jumpPower=20;gravity=0.75}
if(selectedSkin==2){jumpPower=20;gravity=0.75}
if(selectedSkin==3){jumpPower=21;gravity=0.74}
if(selectedSkin==4){jumpPower=24;gravity=0.68}
}

// ===== エフェクト =====
let effects=[]

function createEffect(){
if(selectedSkin==4){
for(let i=0;i<6;i++){
effects.push({
x:chicken.x+25,
y:chicken.y+25,
vx:(Math.random()-0.5)*4,
vy:(Math.random()-0.5)*4,
life:1
})
}
}
}

// ===== ゲーム =====
let baseSpeed=7
let speed=7
let maxSpeed=15

let chicken,obstacles=[]

let lastTap=0
let ignoreTapUntil=0
const delay=250

function tap(){
if(state!=="game") return
if(Date.now()<ignoreTapUntil) return

let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-(jumpPower+2)
chicken.jump=2
createEffect()
}
}else{
if(chicken.jump===0){
chicken.vy=-jumpPower
chicken.jump=1
createEffect()
}
}
lastTap=now
}

document.addEventListener("touchstart",tap)
document.addEventListener("mousedown",tap)

function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
speed=baseSpeed
effects=[]
}

function start(d){
if(Date.now()<ignoreTapUntil) return

if(d=="easy"){baseSpeed=5;maxSpeed=10}
else if(d=="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

applySkin()
reset()
state="game"
ignoreTapUntil=Date.now()+500
}

function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

setInterval(()=>{
if(state=="game"){
obstacles.push({x:1280,y:540})
}
},1200)

// 更新
function update(){
if(state!="game")return

chicken.vy+=gravity
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x < o.x + 40 &&
chicken.x + 50 > o.x &&
chicken.y < o.y + 80 &&
chicken.y + 50 > o.y
){
state="gameover"
ignoreTapUntil=Date.now()+500

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

// エフェクト更新
effects.forEach(e=>{
e.x+=e.vx
e.y+=e.vy
e.life-=0.03
})
effects=effects.filter(e=>e.life>0)

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ボタン
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// タイトル
function drawTitle(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("🐔 ちきんゲーム",640,200)

drawBtn(440,320,400,80,"EASY")
drawBtn(440,420,400,80,"NORMAL")
drawBtn(440,520,400,80,"HARD")
drawBtn(440,620,400,70,"スキン選択")
}

// スキン
function drawSkin(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="60px JK"
ctx.fillText("スキン選択",640,120)

ctx.font="70px JK"

skins.forEach((s,i)=>{
let x=320+i*160

if(!isUnlocked(i)){
ctx.fillText("🔒",x,300)
}else{
ctx.fillText(s,x,300)
}

if(i==selectedSkin){
ctx.strokeStyle="red"
ctx.lineWidth=5
ctx.strokeRect(x-40,250,80,80)
}
})

// 説明
ctx.fillStyle="rgba(255,255,255,0.8)"
ctx.fillRect(340,420,600,70)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.fillText(skinInfo[selectedSkin],640,465)

ctx.font="30px JK"
ctx.fillText("🦅:5000点　🐲:8000点",640,520)

drawBtn(440,580,400,80,"もどる")
}

// ゲーム
function drawGame(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

ctx.font="50px JK"

let drawX=chicken.x
if(selectedSkin==2){
drawX+=Math.sin(Date.now()*0.01)*5
}

ctx.fillText(skins[selectedSkin],drawX,chicken.y+40)

// サボテン
obstacles.forEach(o=>{
ctx.fillStyle="green"
ctx.fillRect(o.x,o.y,20,60)
ctx.fillRect(o.x-10,o.y+20,10,20)
ctx.fillRect(o.x+20,o.y+30,10,20)
})

// ✨エフェクト
ctx.font="30px JK"
effects.forEach(e=>{
ctx.globalAlpha=e.life
ctx.fillText("✨",e.x,e.y)
ctx.globalAlpha=1
})

// スコア
ctx.textAlign="right"
ctx.font="32px JK"
ctx.fillStyle="black"

ctx.fillText("Score "+score,1220,80)
ctx.fillText("High "+highScore,1220,130)
}

// ゲームオーバー
function drawGameOver(){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("GAME OVER",640,260)

drawBtn(440,400,400,80,"RESTART")
drawBtn(440,510,400,80,"TITLE")
}

// クリック
canvas.addEventListener("click",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

canvas.addEventListener("touchstart",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

function handleClick(x,y){

if(Date.now()<ignoreTapUntil) return

if(state=="title"){
if(inRect(x,y,440,320,400,80))start("easy")
if(inRect(x,y,440,420,400,80))start("normal")
if(inRect(x,y,440,520,400,80))start("hard")

if(inRect(x,y,440,620,400,70)){
state="skin"
ignoreTapUntil=Date.now()+300
}
}

else if(state=="skin"){
skins.forEach((s,i)=>{
let sx=320+i*160
if(inRect(x,y,sx-40,250,80,80)){
if(isUnlocked(i)){
selectedSkin=i
localStorage.setItem("skin",i)
}
}
})

if(inRect(x,y,440,580,400,80)){
state="title"
ignoreTapUntil=Date.now()+300
}
}

else if(state=="gameover"){
if(inRect(x,y,440,400,400,80)){reset();state="game"}
if(inRect(x,y,440,510,400,80)){
state="title"
ignoreTapUntil=Date.now()+600
}
}
}

// ループ
function loop(){
update()

if(state=="title")drawTitle()
if(state=="skin")drawSkin()
if(state=="game")drawGame()
if(state=="gameover")drawGameOver()

requestAnimationFrame(loop)
}
loop()
</script>
</body>
</html>
