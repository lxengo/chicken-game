<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<style>
body{
margin:0;
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let chicken, obstacles=[]
let score=0
let highScore=localStorage.getItem("high")||0

let speed=6
let lastTap=0
const delay=250

let time=0

// ===== 初期化 =====
function reset(){
chicken={x:200,y:600,vy:0,jump:0}
obstacles=[]
score=0
}

// ===== スタート =====
function start(){
reset()
state="game"
}

// ===== 入力 =====
canvas.addEventListener("mousedown",handleInput)
canvas.addEventListener("touchstart",handleInput)

function handleInput(e){
let p=getPos(e)

if(state==="game"){
jump()
}

handleClick(p.x,p.y)
}

// ===== 座標 =====
function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// ===== ジャンプ（2段）=====
function jump(){
let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}
lastTap=now
}

// ===== クリック =====
function handleClick(x,y){

// タイトル
if(state==="title"){
if(inRect(x,y,440,260,400,70)){speed=4;start()}
if(inRect(x,y,440,350,400,70)){speed=6;start()}
if(inRect(x,y,440,440,400,70)){speed=8;start()}
}

// ゲーム中
if(state==="game"){
if(inRect(x,y,1100,20,140,60)){
state="menu"
}
}

// メニュー
if(state==="menu"){
if(inRect(x,y,360,200,560,100)){state="game"}
if(inRect(x,y,360,320,560,100)){reset();state="game"}
if(inRect(x,y,360,440,560,100)){state="title"}
}

// ゲームオーバー
if(state==="gameover"){
if(inRect(x,y,440,400,400,80)){reset();state="game"}
if(inRect(x,y,440,510,400,80)){state="title"}
}
}

// ===== サボテン =====
setInterval(()=>{
if(state==="game"){
let h=30+Math.random()*50
obstacles.push({x:1280,y:650-h,w:20,h:h})
}
},1800)

// ===== 更新 =====
function update(){
if(state!=="game")return

time++

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>600){
chicken.y=600
chicken.vy=0
chicken.jump=0
}

obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x < o.x + o.w &&
chicken.x + 40 > o.x &&
chicken.y < o.y + o.h &&
chicken.y + 40 > o.y
){
state="gameover"
if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)

score++
}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,1280,720)

// タイトル
if(state==="title"){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.font="45px sans-serif"
ctx.textAlign="center"
ctx.fillText("🐔 ちきんゲーム",640,180)

btn(440,260,400,70,"EASY")
btn(440,350,400,70,"NORMAL")
btn(440,440,400,70,"HARD")
}

// ゲーム
if(state==="game"){

// 昼夜（90秒）
let phase=time%2700

if(phase<900) ctx.fillStyle="#87CEEB"
else if(phase<1800) ctx.fillStyle="#4FC3F7"
else ctx.fillStyle="#0B1A3C"

ctx.fillRect(0,0,1280,720)

// 太陽/月
ctx.beginPath()
ctx.arc(1000,80,25,0,Math.PI*2)
ctx.fillStyle=(phase<1800)?"yellow":"white"
ctx.fill()

// 地面
ctx.fillStyle="#8B4513"
ctx.fillRect(0,650,1280,70)

// ニワトリ
ctx.font="40px sans-serif"
ctx.fillText("🐔",chicken.x,chicken.y+30)

// サボテン
obstacles.forEach(o=>{
ctx.fillStyle="green"
ctx.fillRect(o.x,o.y,o.w,o.h)
})

// スコア
ctx.fillStyle=(phase<1800)?"black":"white"
ctx.font="28px sans-serif"
ctx.textAlign="left"
ctx.fillText("Score: "+score,30,50)
ctx.fillText("High: "+highScore,30,90)

// メニュー
btn(1100,20,140,60,"≡")
}

// メニュー画面
if(state==="menu"){
ctx.fillStyle="rgba(0,0,0,0.7)"
ctx.fillRect(0,0,1280,720)

btn(360,200,560,100,"再開")
btn(360,320,560,100,"リスタート")
btn(360,440,560,100,"タイトル")
}

// ゲームオーバー
if(state==="gameover"){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.font="50px sans-serif"
ctx.textAlign="center"
ctx.fillText("GAME OVER",640,250)

ctx.font="35px sans-serif"
ctx.fillText("Score: "+score,640,320)

btn(440,400,400,80,"RESTART")
btn(440,510,400,80,"TITLE")
}
}

// ===== ボタン =====
function btn(x,y,w,h,t){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="28px sans-serif"
ctx.textAlign="center"
ctx.fillText(t,x+w/2,y+h/2+10)
}

// ===== ループ =====
function loop(){
update()
draw()
requestAnimationFrame(loop)
}
loop()
</script>
</body>
</html>
