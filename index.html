<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
font-family:"JK", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let chicken,obstacles=[]

let time=0

let lastTap=0
let ignoreTapUntil=0
let inputDelay=0
const delay=250

// ===== ジャンプ（どこ押してもOK）=====
function tap(){
if(state!=="game") return
if(Date.now()<ignoreTapUntil) return

let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}
lastTap=now
}

// 👉 画面全体でジャンプ
document.addEventListener("touchstart",tap)
document.addEventListener("mousedown",tap)

// ===== 初期化 =====
function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
speed=baseSpeed
time=0
}

// ===== 難易度 =====
function start(d){
if(d=="easy"){baseSpeed=5;maxSpeed=10}
else if(d=="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
ignoreTapUntil=Date.now()+200
inputDelay=0
}

// ===== 座標 =====
function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// ===== サボテン（ちゃんとした形）=====
setInterval(()=>{
if(state=="game"){
let h=60
obstacles.push({x:1280,y:600-h})
}
},1200)

// ===== 更新 =====
function update(){
if(state!="game")return

time++

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

obstacles.forEach(o=>{
o.x-=speed

// 当たり判定
if(
chicken.x < o.x + 40 &&
chicken.x + 50 > o.x &&
chicken.y < o.y + 80 &&
chicken.y + 50 > o.y
){
state="gameover"
ignoreTapUntil=Date.now()+300

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ===== ボタン =====
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// ===== タイトル =====
function drawTitle(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("🐔 ちきんゲーム",640,200)

drawBtn(440,350,400,80,"EASY")
drawBtn(440,460,400,80,"NORMAL")
drawBtn(440,570,400,80,"HARD")
}

// ===== ゲーム =====
function drawGame(){

ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

// ニワトリ
ctx.font="50px JK"
ctx.fillText("🐔",chicken.x,chicken.y+40)

// サボテン（それっぽい）
obstacles.forEach(o=>{
ctx.fillStyle="green"

// 本体
ctx.fillRect(o.x,o.y,20,60)

// 左枝
ctx.fillRect(o.x-10,o.y+20,10,20)

// 右枝
ctx.fillRect(o.x+20,o.y+30,10,20)
})

ctx.fillStyle="black"
ctx.font="40px JK"
ctx.fillText("Score "+score,40,60)
ctx.fillText("High "+highScore,40,110)
}

// ===== ゲームオーバー =====
function drawGameOver(){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("GAME OVER",640,260)

drawBtn(440,400,400,80,"RESTART")
drawBtn(440,510,400,80,"TITLE")
}

// ===== クリック =====
canvas.addEventListener("click",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

canvas.addEventListener("touchstart",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

function handleClick(x,y){

if(Date.now()<ignoreTapUntil) return

if(state=="title"){
if(inRect(x,y,440,350,400,80))start("easy")
if(inRect(x,y,440,460,400,80))start("normal")
if(inRect(x,y,440,570,400,80))start("hard")
}

else if(state=="gameover"){
if(inRect(x,y,440,400,400,80)){reset();state="game"}
if(inRect(x,y,440,510,400,80)){
state="title"
inputDelay=0
}
}
}

// ===== ループ =====
function loop(){
update()

if(state=="title")drawTitle()
if(state=="game")drawGame()
if(state=="gameover")drawGameOver()

requestAnimationFrame(loop)
}
loop()

</script>
</body>
</html>
