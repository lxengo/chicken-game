<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
font-family:"JK", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
touch-action:none;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let chicken,obstacles=[]

let time=0
let clouds=[]
let stars=[]

let lastTap=0
let ignoreTapUntil=0
let inputDelay=0
const delay=250

function tap(){
if(state!="game") return
if(Date.now()<ignoreTapUntil) return

let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}
lastTap=now
}

document.addEventListener("touchstart",tap)
document.addEventListener("mousedown",tap)

function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
speed=baseSpeed
time=0
clouds=[]
stars=[]
}

function start(d){
if(d=="easy"){baseSpeed=5;maxSpeed=10}
else if(d=="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
ignoreTapUntil=Date.now()+200
inputDelay=20
}

function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// サボテン
setInterval(()=>{
if(state=="game"){
let h=40+Math.random()*60
obstacles.push({x:1280,y:600-h,w:30,h:h})
}
},1200)

// 雲・星
setInterval(()=>{
if(state=="game"){
let phase=time%2700

if(phase>=900 && phase<1800){
clouds.push({x:1280,y:50+Math.random()*200,size:40+Math.random()*30})
}
if(phase>=1800){
stars.push({x:1280,y:Math.random()*400,size:2+Math.random()*3})
}
}
},800)

function update(){
if(state!="game")return

time++
if(inputDelay>0) inputDelay--

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x < o.x + o.w &&
chicken.x + 50 > o.x &&
chicken.y < o.y + o.h &&
chicken.y + 50 > o.y
){
state="gameover"
ignoreTapUntil=Date.now()+300

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

clouds.forEach(c=>c.x-=2)
clouds=clouds.filter(c=>c.x>-100)

stars.forEach(s=>s.x-=4)
stars=stars.filter(s=>s.x>-10)

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

function drawTitle(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("🐔 ちきんゲーム",640,200)

drawBtn(440,350,400,80,"EASY")
drawBtn(440,460,400,80,"NORMAL")
drawBtn(440,570,400,80,"HARD")
}

function drawGame(){

let phase=time%2700

if(phase<900){
ctx.fillStyle="#87CEEB"
}
else if(phase<1800){
ctx.fillStyle="#4FC3F7"
}
else{
ctx.fillStyle="#0B1A3C"
}
ctx.fillRect(0,0,1280,720)

// 太陽・月
ctx.beginPath()
ctx.arc(1000,80,35,0,Math.PI*2)
ctx.fillStyle=(phase<1800)?"yellow":"white"
ctx.fill()

// 雲
if(phase>=900 && phase<1800){
ctx.fillStyle="white"
clouds.forEach(c=>{
ctx.beginPath()
ctx.arc(c.x,c.y,c.size,0,Math.PI*2)
ctx.arc(c.x+30,c.y+10,c.size*0.8,0,Math.PI*2)
ctx.arc(c.x-30,c.y+10,c.size*0.8,0,Math.PI*2)
ctx.fill()
})
}

// 星
if(phase>=1800){
ctx.fillStyle="white"
stars.forEach(s=>{
ctx.beginPath()
ctx.arc(s.x,s.y,s.size,0,Math.PI*2)
ctx.fill()
})
}

// 地面
ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

// ニワトリ
ctx.font="50px JK"
ctx.fillText("🐔",chicken.x,chicken.y+40)

// サボテン
obstacles.forEach(o=>{
ctx.fillStyle="green"
ctx.fillRect(o.x,o.y,o.w,o.h)
ctx.fillRect(o.x-10,o.y+20,10,30)
ctx.fillRect(o.x+o.w,o.y+30,10,30)
})

// スコア
ctx.fillStyle=(phase<1800)?"black":"white"
ctx.textAlign="left"
ctx.font="40px JK"

ctx.fillText("Score "+score,40,60)
ctx.fillText("High "+highScore,40,110)

drawBtn(1100,20,140,60,"☰")
}

function drawMenu(){
ctx.fillStyle="rgba(0,0,0,0.7)"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.fillRect(340,180,600,360)

let h=360/3

drawBtn(360,200,560,h-20,"再開")
drawBtn(360,200+h,560,h-20,"リスタート")
drawBtn(360,200+h*2,560,h-20,"タイトル")
}

function drawGameOver(){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("GAME OVER",640,260)

ctx.font="40px JK"
ctx.fillText("Score "+score,640,330)

drawBtn(440,420,400,80,"RESTART")
drawBtn(440,530,400,80,"TITLE")
}

function handleClick(x,y){

if(inputDelay>0) return
if(Date.now()<ignoreTapUntil) return

if(state=="title"){
if(inRect(x,y,440,350,400,80))start("easy")
if(inRect(x,y,440,460,400,80))start("normal")
if(inRect(x,y,440,570,400,80))start("hard")
}

else if(state=="game"){
if(inRect(x,y,1100,20,140,60)){
state="menu"
inputDelay=20
}
}

else if(state=="menu"){
let h=360/3

if(inRect(x,y,360,200,560,h-20)){state="game"}
if(inRect(x,y,360,200+h,560,h-20)){reset();state="game"}
if(inRect(x,y,360,200+h*2,560,h-20)){state="title";inputDelay=20}
}

else if(state=="gameover"){
if(inRect(x,y,440,420,400,80)){reset();state="game"}
if(inRect(x,y,440,530,400,80)){state="title";inputDelay=20}
}
}

canvas.addEventListener("click",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

canvas.addEventListener("touchstart",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

function loop(){
update()

if(state=="title")drawTitle()
if(state=="game")drawGame()
if(state=="menu")drawMenu()
if(state=="gameover")drawGameOver()

requestAnimationFrame(loop)
}
loop()

// PWA
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js')
}
</script>

</body>
</html>
