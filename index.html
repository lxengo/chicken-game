<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:"JK", sans-serif;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
touch-action:none;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let chicken, obstacles=[]
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let lastTap=0
const delay=250

let time=0

// ===== 初期化 =====
function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
time=0
}

// ===== スタート =====
function start(mode){
if(mode==="easy"){baseSpeed=5;maxSpeed=10}
else if(mode==="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
}

// ===== 座標 =====
function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// ===== ジャンプ =====
function jump(){
let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}
lastTap=now
}

// ===== 入力 =====
canvas.addEventListener("pointerdown", e=>{
e.preventDefault()

let p=getPos(e)

handleClick(p.x,p.y)

if(state==="game"){
jump()
}
})

// ===== クリック処理 =====
function handleClick(x,y){

if(state==="title"){
if(inRect(x,y,440,350,400,80)) start("easy")
if(inRect(x,y,440,460,400,80)) start("normal")
if(inRect(x,y,440,570,400,80)) start("hard")
}

else if(state==="game"){
if(inRect(x,y,1100,20,140,60)){
state="menu"
}
}

else if(state==="menu"){
let h=120
if(inRect(x,y,360,200,560,h)){state="game"}
if(inRect(x,y,360,320,560,h)){reset();state="game"}
if(inRect(x,y,360,440,560,h)){state="title"}
}

else if(state==="gameover"){
if(inRect(x,y,440,420,400,80)){reset();state="game"}
if(inRect(x,y,440,530,400,80)){state="title"}
}
}

// ===== 更新 =====
function update(){
if(state!=="game")return

time++

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

// スピード
speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

// ===== サボテン生成（ここ重要）=====
if(Math.random()<0.02){
let h=40+Math.random()*60
obstacles.push({
x:1280,
y:600-h,
w:30,
h:h
})
}

// 移動＆当たり判定
obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x < o.x + o.w &&
chicken.x + 50 > o.x &&
chicken.y < o.y + o.h &&
chicken.y + 50 > o.y
){
state="gameover"

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)

score++
}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,1280,720)

// ===== 朝昼夜 =====
let phase=time%2700

if(phase<900){
ctx.fillStyle="#87CEEB"
}else if(phase<1800){
ctx.fillStyle="#4FC3F7"
}else{
ctx.fillStyle="#0B1A3C"
}
ctx.fillRect(0,0,1280,720)

// ===== 太陽・月 =====
ctx.beginPath()
ctx.arc(1000,80,30,0,Math.PI*2)
ctx.fillStyle=phase<1800?"yellow":"white"
ctx.fill()

// ===== 地面 =====
ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

// ===== タイトル =====
if(state==="title"){
ctx.fillStyle="black"
ctx.textAlign="center"
ctx.font="70px JK"
ctx.fillText("🐔 ちきんゲーム",640,200)

drawBtn(440,350,400,80,"EASY")
drawBtn(440,460,400,80,"NORMAL")
drawBtn(440,570,400,80,"HARD")
}

// ===== ゲーム =====
if(state==="game"){
ctx.font="50px JK"
ctx.fillText("🐔",chicken.x,chicken.y+40)

// サボテン描画
obstacles.forEach(o=>{
ctx.fillStyle="green"
ctx.fillRect(o.x,o.y,o.w,o.h)
ctx.fillRect(o.x-10,o.y+20,10,30)
ctx.fillRect(o.x+o.w,o.y+30,10,30)
})

// スコア（見切れ防止）
ctx.fillStyle=phase<1800?"black":"white"
ctx.textAlign="left"
ctx.font="35px JK"
ctx.fillText("Score: "+score,20,50)
ctx.fillText("High: "+highScore,20,90)

drawBtn(1100,20,140,60,"☰")
}

// ===== メニュー =====
if(state==="menu"){
ctx.fillStyle="rgba(0,0,0,0.7)"
ctx.fillRect(0,0,1280,720)

drawBtn(360,200,560,120,"再開")
drawBtn(360,320,560,120,"リスタート")
drawBtn(360,440,560,120,"タイトル")
}

// ===== ゲームオーバー =====
if(state==="gameover"){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"
ctx.font="60px JK"
ctx.fillText("GAME OVER",640,260)

ctx.font="40px JK"
ctx.fillText("Score "+score,640,330)

drawBtn(440,420,400,80,"RESTART")
drawBtn(440,530,400,80,"TITLE")
}
}

// ===== ボタン =====
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// ===== ループ ==
