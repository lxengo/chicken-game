<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<style>
body{
margin:0;
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let chicken, obstacles=[]
let score=0
let highScore=localStorage.getItem("high")||0

let lastTap=0
const delay=250

let time=0

function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
time=0
}

function start(){
reset()
state="game"
}

// ===== 入力 =====
canvas.addEventListener("touchstart",input)
canvas.addEventListener("mousedown",input)

function input(e){
let rect=canvas.getBoundingClientRect()
let x=(e.touches?e.touches[0].clientX:e.clientX)-rect.left
let y=(e.touches?e.touches[0].clientY:e.clientY)-rect.top

let scaleX=1280/rect.width
let scaleY=720/rect.height
x*=scaleX
y*=scaleY

if(state==="game"){
jump()
}

click(x,y)
}

function jump(){
let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump++
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}
lastTap=now
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// ===== クリック =====
function click(x,y){

if(state==="title"){
if(inRect(x,y,440,300,400,80)) start()
if(inRect(x,y,440,400,400,80)) start()
if(inRect(x,y,440,500,400,80)) start()
}

else if(state==="game"){
if(inRect(x,y,1080,20,160,60)){
state="menu"
}
}

else if(state==="menu"){
if(inRect(x,y,360,220,560,100)) state="game"
if(inRect(x,y,360,340,560,100)){reset();state="game"}
if(inRect(x,y,360,460,560,100)) state="title"
}

else if(state==="gameover"){
if(inRect(x,y,440,420,400,80)){reset();state="game"}
if(inRect(x,y,440,520,400,80)) state="title"
}
}

// ===== サボテン =====
setInterval(()=>{
if(state==="game"){
let h=40+Math.random()*80
obstacles.push({x:1280,y:600-h,w:30,h:h})
}
},1400)

// ===== 更新 =====
function update(){
if(state!=="game")return

time++

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

obstacles.forEach(o=>{
o.x-=8

if(
chicken.x < o.x + o.w &&
chicken.x + 40 > o.x &&
chicken.y < o.y + o.h &&
chicken.y + 40 > o.y
){
state="gameover"
if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ===== ボタン =====
function btn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="30px sans-serif"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,1280,720)

let phase=time%2700

let bg="#87CEEB"
if(phase>=1800) bg="#0B1A3C"

ctx.fillStyle=bg
ctx.fillRect(0,0,1280,720)

// 地面
ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

if(state==="title"){
ctx.fillStyle="black"
ctx.font="50px sans-serif"
ctx.textAlign="center"
ctx.fillText("🐔 ちきんゲーム",640,200)

btn(440,300,400,80,"EASY")
btn(440,400,400,80,"NORMAL")
btn(440,500,400,80,"HARD")
}

if(state==="game"){

// ニワトリ
ctx.font="40px sans-serif"
ctx.fillText("🐔",chicken.x,chicken.y+40)

// サボテン
ctx.fillStyle="green"
obstacles.forEach(o=>{
ctx.fillRect(o.x,o.y,o.w,o.h)
})

// スコア（ズレ修正）
ctx.fillStyle=(phase>=1800)?"white":"black"
ctx.font="28px sans-serif"
ctx.textAlign="left"
ctx.fillText("Score: "+score,30,40)
ctx.fillText("High: "+highScore,30,80)

btn(1080,20,160,60,"☰")
}

if(state==="menu"){
ctx.fillStyle="rgba(0,0,0,0.7)"
ctx.fillRect(0,0,1280,720)

btn(360,220,560,100,"再開")
btn(360,340,560,100,"リスタート")
btn(360,460,560,100,"タイトル")
}

if(state==="gameover"){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="60px sans-serif"
ctx.fillText("GAME OVER",640,250)

ctx.font="35px sans-serif"
ctx.fillText("Score: "+score,640,320)

btn(440,420,400,80,"RESTART")
btn(440,520,400,80,"TITLE")
}
}

// ===== ループ =====
function loop(){
update()
draw()
requestAnimationFrame(loop)
}
loop()
</script>
</body>
</html>
