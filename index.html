<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:"JK", sans-serif;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
touch-action:none;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

function resizeCanvas(){
const box=document.getElementById("gameBox")
if(box.clientWidth===0) return
canvas.width=box.clientWidth
canvas.height=box.clientHeight
}

window.addEventListener("load",()=>{
resizeCanvas()
reset()
})

window.addEventListener("resize",resizeCanvas)

let state="title"
let chicken, obstacles=[]
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let time=0
let spawnTimer=0
let spawnInterval=100

// ===== 初期化 =====
function reset(){
chicken={
x:canvas.width*0.15,
y:canvas.height-140,
vy:0,
jumpCount:0
}
obstacles=[]
score=0
time=0
spawnTimer=0
}

// ===== スタート =====
function start(mode){
if(mode==="easy"){baseSpeed=5;maxSpeed=10}
else if(mode==="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
}

// ===== 座標 =====
function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// ===== ジャンプ =====
function jump(){
if(chicken.jumpCount<2){
chicken.vy=-16
chicken.jumpCount++
}
}

// ===== 入力 =====
canvas.addEventListener("pointerdown", e=>{
e.preventDefault()
let p=getPos(e)

handleClick(p.x,p.y)

if(state==="game") jump()
})

// ===== クリック処理 =====
function handleClick(x,y){

let cx=canvas.width/2
let w=canvas.width*0.4

if(state==="title"){
if(inRect(x,y,cx-w/2,canvas.height*0.45,w,60)) start("easy")
if(inRect(x,y,cx-w/2,canvas.height*0.55,w,60)) start("normal")
if(inRect(x,y,cx-w/2,canvas.height*0.65,w,60)) start("hard")
}

else if(state==="game"){
if(inRect(x,y,canvas.width-140,20,120,50)) state="menu"
}

else if(state==="menu"){
if(inRect(x,y,cx-w/2,canvas.height*0.4,w,70)) state="game"
if(inRect(x,y,cx-w/2,canvas.height*0.5,w,70)){reset();state="game"}
if(inRect(x,y,cx-w/2,canvas.height*0.6,w,70)) state="title"
}

else if(state==="gameover"){
if(inRect(x,y,cx-w/2,canvas.height*0.5,w,60)){reset();state="game"}
if(inRect(x,y,cx-w/2,canvas.height*0.6,w,60)) state="title"
}
}

// ===== 更新 =====
function update(){
if(state!=="game")return

time++

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>canvas.height-120){
chicken.y=canvas.height-120
chicken.vy=0
chicken.jumpCount=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

spawnTimer++
if(spawnTimer>spawnInterval){
spawnTimer=0

let h=40+Math.random()*60

obstacles.push({
x:canvas.width,
y:canvas.height-120-h,
w:30,
h:h
})

spawnInterval=90+Math.random()*60
}

obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x < o.x + o.w &&
chicken.x + 40 > o.x &&
chicken.y < o.y + o.h &&
chicken.y + 40 > o.y
){
state="gameover"

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ===== 描画 =====
function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

let phase=time%2700
ctx.fillStyle=phase<900?"#87CEEB":phase<1800?"#4FC3F7":"#0B1A3C"
ctx.fillRect(0,0,canvas.width,canvas.height)

// 太陽/月
ctx.beginPath()
ctx.arc(canvas.width-70,60,20,0,Math.PI*2)
ctx.fillStyle=phase<1800?"yellow":"white"
ctx.fill()

// 地面
ctx.fillStyle="#8B4513"
ctx.fillRect(0,canvas.height-120,canvas.width,120)

// ===== タイトル =====
if(state==="title"){
ctx.fillStyle="black"
ctx.textAlign="center"
ctx.textBaseline="middle"

ctx.font="40px JK"
ctx.fillText("🐔 ちきんゲーム",canvas.width/2,canvas.height*0.3)

let cx=canvas.width/2
let w=canvas.width*0.4

drawBtn(cx-w/2,canvas.height*0.45,w,60,"EASY")
drawBtn(cx-w/2,canvas.height*0.55,w,60,"NORMAL")
drawBtn(cx-w/2,canvas.height*0.65,w,60,"HARD")
}

// ===== ゲーム =====
if(state==="game"){
ctx.font="40px JK"
ctx.fillText("🐔",chicken.x,chicken.y)

obstacles.forEach(o=>{
ctx.fillStyle="green"
ctx.fillRect(o.x,o.y,o.w,o.h)
})

// スコア（見切れ防止）
ctx.fillStyle=phase<1800?"black":"white"
ctx.textAlign="left"
ctx.font="20px JK"
ctx.fillText("Score: "+score,20,30)
ctx.fillText("High: "+highScore,20,55)

drawBtn(canvas.width-140,20,120,50,"☰")
}

// ===== メニュー =====
if(state==="menu"){
ctx.fillStyle="rgba(0,0,0,0.6)"
ctx.fillRect(0,0,canvas.width,canvas.height)

let cx=canvas.width/2
let w=canvas.width*0.4

drawBtn(cx-w/2,canvas.height*0.4,w,70,"再開")
drawBtn(cx-w/2,canvas.height*0.5,w,70,"リスタート")
drawBtn(cx-w/2,canvas.height*0.6,w,70,"タイトル")
}

// ===== ゲームオーバー =====
if(state==="gameover"){
ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.textAlign="center"
ctx.font="40px JK"
ctx.fillText("GAME OVER",canvas.width/2,canvas.height*0.3)
ctx.fillText("Score "+score,canvas.width/2,canvas.height*0.4)

let cx=canvas.width/2
let w=canvas.width*0.4

drawBtn(cx-w/2,canvas.height*0.5,w,60,"RESTART")
drawBtn(cx-w/2,canvas.height*0.6,w,60,"TITLE")
}
}

// ボタン
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)
ctx.fillStyle="black"
ctx.textAlign="center"
ctx.textBaseline="middle"
ctx.font="20px JK"
ctx.fillText(text,x+w/2,y+h/2)
}

// ループ
function loop(){
resizeCanvas()
update()
draw()
requestAnimationFrame(loop)
}
loop()

// PWA
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./sw.js")
}
</script>
</body>
</html>
