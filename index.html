<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>
<link rel="manifest" href="manifest.json">

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
font-family:"JK", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
display:flex;
justify-content:center;
align-items:center;
}

canvas{
background:black;
border-radius:20px;
touch-action:none;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

// 🔥 自動リサイズ（中央寄せ対応）
function resizeCanvas(){
const ratio = 16/9

let w = window.innerWidth
let h = window.innerHeight

if(w/h > ratio){
canvas.height = h * 0.9
canvas.width = canvas.height * ratio
}else{
canvas.width = w * 0.9
canvas.height = canvas.width / ratio
}
}
resizeCanvas()
window.addEventListener("resize",resizeCanvas)

let state="title"
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let chicken,obstacles=[]

// タップ制御
let lastTap=0
let ignoreTapUntil=0
const delay=250

function tap(){
if(state!="game") return
if(Date.now()<ignoreTapUntil) return

let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}

lastTap=now
}

document.addEventListener("touchstart",tap)
document.addEventListener("mousedown",tap)

// リセット
function reset(){
chicken={x:canvas.width*0.15,y:canvas.height*0.78,vy:0,jump:0}
obstacles=[]
score=0
speed=baseSpeed
}

// 難易度
function start(d){
if(d=="easy"){baseSpeed=5;maxSpeed=10}
else if(d=="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
ignoreTapUntil=Date.now()+200
}

// 座標補正
function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// サボテン
setInterval(()=>{
if(state=="game"){
let h=canvas.height*0.08 + Math.random()*canvas.height*0.08
obstacles.push({
x:canvas.width,
y:canvas.height*0.83 - h,
w:canvas.width*0.02,
h:h
})
}
},1200)

// 更新
function update(){
if(state!="game")return

chicken.vy+=canvas.height*0.001
chicken.y+=chicken.vy

if(chicken.y>canvas.height*0.78){
chicken.y=canvas.height*0.78
chicken.vy=0
chicken.jump=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

obstacles.forEach(o=>{
o.x-=speed*(canvas.width/1280)

if(
chicken.x<o.x+o.w &&
chicken.x+50<canvas.width*0.05+o.x &&
chicken.y<o.y+o.h &&
chicken.y+50>o.y
){
state="gameover"
ignoreTapUntil=Date.now()+300

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ボタン
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font=(canvas.width*0.03)+"px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// タイトル
function drawTitle(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font=(canvas.width*0.06)+"px JK"
ctx.fillText("🐔 ちきんゲーム",canvas.width/2,canvas.height*0.25)

drawBtn(canvas.width*0.35,canvas.height*0.45,canvas.width*0.3,80,"EASY")
drawBtn(canvas.width*0.35,canvas.height*0.6,canvas.width*0.3,80,"NORMAL")
drawBtn(canvas.width*0.35,canvas.height*0.75,canvas.width*0.3,80,"HARD")
}

// ゲーム
function drawGame(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#8B4513"
ctx.fillRect(0,canvas.height*0.83,canvas.width,canvas.height*0.17)

ctx.font=(canvas.width*0.04)+"px JK"
ctx.fillText("🐔",chicken.x,chicken.y+40)

ctx.fillStyle="green"
obstacles.forEach(o=>ctx.fillRect(o.x,o.y,o.w,o.h))

ctx.fillStyle="black"
ctx.textAlign="left"
ctx.font=(canvas.width*0.03)+"px JK"

ctx.fillText("Score "+score,20,40)
ctx.fillText("High "+highScore,20,80)

drawBtn(canvas.width-120,20,100,50,"☰")
}

// メニュー
function drawMenu(){
ctx.fillStyle="rgba(0,0,0,0.7)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.fillRect(canvas.width*0.25,canvas.height*0.25,canvas.width*0.5,canvas.height*0.4)

let h=canvas.height*0.4/3

drawBtn(canvas.width*0.27,canvas.height*0.27,canvas.width*0.46,h-10,"再開")
drawBtn(canvas.width*0.27,canvas.height*0.27+h,canvas.width*0.46,h-10,"リスタート")
drawBtn(canvas.width*0.27,canvas.height*0.27+h*2,canvas.width*0.46,h-10,"タイトル")
}

// ゲームオーバー
function drawGameOver(){
ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font=(canvas.width*0.06)+"px JK"
ctx.fillText("GAME OVER",canvas.width
