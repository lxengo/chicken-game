<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>ちきんゲーム</title>

<style>
@font-face{
font-family:"JK";
src:url("./JKMaruGothic.ttf");
}

body{
margin:0;
background:#ddd;
font-family:"JK", sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

#gameBox{
width:90vw;
max-width:800px;
aspect-ratio:16/9;
background:black;
border-radius:20px;
overflow:hidden;
}

canvas{
width:100%;
height:100%;
}
</style>
</head>

<body>
<div id="gameBox">
<canvas id="game"></canvas>
</div>

<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

canvas.width=1280
canvas.height=720

let state="title"
let score=0
let highScore=localStorage.getItem("high")||0

let baseSpeed=7
let speed=7
let maxSpeed=15

let chicken,obstacles=[]

// ★ スキン
let skins=["🐔","🐤","🍗"]
let selectedSkin=0

let lastTap=0
let ignoreTapUntil=0
const delay=250

function tap(){
if(state!=="game") return
if(Date.now()<ignoreTapUntil) return

let now=Date.now()

if(now-lastTap<delay){
if(chicken.jump<2){
chicken.vy=-18
chicken.jump=2
}
}else{
if(chicken.jump===0){
chicken.vy=-16
chicken.jump=1
}
}
lastTap=now
}

document.addEventListener("touchstart",tap)
document.addEventListener("mousedown",tap)

function reset(){
chicken={x:200,y:560,vy:0,jump:0}
obstacles=[]
score=0
speed=baseSpeed
}

function start(d){
if(Date.now()<ignoreTapUntil) return

if(d=="easy"){baseSpeed=5;maxSpeed=10}
else if(d=="hard"){baseSpeed=9;maxSpeed=18}
else{baseSpeed=7;maxSpeed=15}

reset()
state="game"
ignoreTapUntil=Date.now()+500
}

function getPos(e){
const r=canvas.getBoundingClientRect()
const sx=canvas.width/r.width
const sy=canvas.height/r.height

if(e.touches){
return{
x:(e.touches[0].clientX-r.left)*sx,
y:(e.touches[0].clientY-r.top)*sy
}
}else{
return{
x:(e.clientX-r.left)*sx,
y:(e.clientY-r.top)*sy
}
}
}

function inRect(x,y,rx,ry,rw,rh){
return x>rx&&x<rx+rw&&y>ry&&y<ry+rh
}

// サボテン
setInterval(()=>{
if(state=="game"){
obstacles.push({x:1280,y:540})
}
},1200)

// 更新
function update(){
if(state!="game")return

chicken.vy+=0.8
chicken.y+=chicken.vy

if(chicken.y>560){
chicken.y=560
chicken.vy=0
chicken.jump=0
}

speed=baseSpeed+score*0.005
if(speed>maxSpeed)speed=maxSpeed

obstacles.forEach(o=>{
o.x-=speed

if(
chicken.x < o.x + 40 &&
chicken.x + 50 > o.x &&
chicken.y < o.y + 80 &&
chicken.y + 50 > o.y
){
state="gameover"
ignoreTapUntil=Date.now()+500

if(score>highScore){
highScore=score
localStorage.setItem("high",highScore)
}
}
})

obstacles=obstacles.filter(o=>o.x>-50)
score++
}

// ボタン
function drawBtn(x,y,w,h,text){
ctx.fillStyle="white"
ctx.fillRect(x,y,w,h)

ctx.fillStyle="black"
ctx.font="35px JK"
ctx.textAlign="center"
ctx.fillText(text,x+w/2,y+h/2+10)
}

// タイトル
function drawTitle(){
ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="black"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("🐔 ちきんゲーム",640,150)

// 難易度
drawBtn(440,300,400,70,"EASY")
drawBtn(440,390,400,70,"NORMAL")
drawBtn(440,480,400,70,"HARD")

// ★ スキン選択
ctx.font="40px JK"
ctx.fillText("スキン選択",640,580)

ctx.font="60px JK"

skins.forEach((s,i)=>{
let x=480+i*160
ctx.fillText(s,x,650)

// 選択枠
if(i===selectedSkin){
ctx.strokeStyle="red"
ctx.lineWidth=5
ctx.strokeRect(x-40,610,80,80)
}
})
}

// ゲーム
function drawGame(){

ctx.fillStyle="#87CEEB"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="#8B4513"
ctx.fillRect(0,600,1280,120)

// ニワトリ（スキン）
ctx.font="50px JK"
ctx.fillText(skins[selectedSkin],chicken.x,chicken.y+40)

// サボテン
obstacles.forEach(o=>{
ctx.fillStyle="green"
ctx.fillRect(o.x,o.y,20,60)
ctx.fillRect(o.x-10,o.y+20,10,20)
ctx.fillRect(o.x+20,o.y+30,10,20)
})

// スコア（見切れ防止）
ctx.textAlign="right"
ctx.font="32px JK"
ctx.fillStyle="black"

ctx.fillText("Score "+score,1220,80)
ctx.fillText("High "+highScore,1220,130)
}

// ゲームオーバー
function drawGameOver(){
ctx.fillStyle="black"
ctx.fillRect(0,0,1280,720)

ctx.fillStyle="white"
ctx.textAlign="center"

ctx.font="70px JK"
ctx.fillText("GAME OVER",640,260)

drawBtn(440,400,400,80,"RESTART")
drawBtn(440,510,400,80,"TITLE")
}

// クリック
canvas.addEventListener("click",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

canvas.addEventListener("touchstart",e=>{
let p=getPos(e)
handleClick(p.x,p.y)
})

function handleClick(x,y){

if(Date.now()<ignoreTapUntil) return

if(state=="title"){
// 難易度
if(inRect(x,y,440,300,400,70))start("easy")
if(inRect(x,y,440,390,400,70))start("normal")
if(inRect(x,y,440,480,400,70))start("hard")

// スキン選択
skins.forEach((s,i)=>{
let sx=480+i*160
if(inRect(x,y,sx-40,610,80,80)){
selectedSkin=i
}
})
}

else if(state=="gameover"){
if(inRect(x,y,440,400,400,80)){reset();state="game"}
if(inRect(x,y,440,510,400,80)){
state="title"
ignoreTapUntil=Date.now()+600
}
}
}

// ループ
function loop(){
update()

if(state=="title")drawTitle()
if(state=="game")drawGame()
if(state=="gameover")drawGameOver()

requestAnimationFrame(loop)
}
loop()

</script>
</body>
</html>
